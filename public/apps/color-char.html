<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>平水韵诗词上色器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F2F5;
      --card-bg: #fff;
      --accent: #DDD4ED;
      --accent-dark: #8e7b9b;
      --text: #1c1917;
      --text-secondary: #78716c;
      --border: #e7e5e4;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 860px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    header h1 span {
      background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    header p { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.6; }
    .input-section {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 1.5rem;
    }
    .input-section label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.6rem; font-weight: 500; }
    textarea {
      width: 100%; min-height: 140px; border: 2px solid var(--border); border-radius: 8px;
      padding: 1rem; font-family: inherit; font-size: 1.1rem; line-height: 2; letter-spacing: 0.06em;
      resize: vertical; outline: none; transition: border-color 0.2s; background: #fafaf9; color: var(--text);
    }
    textarea:focus { border-color: var(--accent-dark); }
    textarea::placeholder { color: #b8b5b0; }
    .btn-row { display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 2rem; border: none; border-radius: 999px;
      font-family: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s; letter-spacing: 0.04em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-dark), #7c5cbf);
      color: #fff; box-shadow: 0 4px 14px rgba(142, 123, 155, 0.35);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(142,123,155,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: var(--card-bg); color: var(--text-secondary); border: 2px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent-dark); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .result-section {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); min-height: 120px; position: relative;
    }
    .result-section .section-title {
      font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.2rem;
      font-weight: 500; display: flex; align-items: center; gap: 0.5rem;
    }
    .result-placeholder { text-align: center; color: #c5c0bc; padding: 2.5rem 0; font-size: 0.95rem; }
    .poem-display { line-height: 2.8; font-size: 1.5rem; letter-spacing: 0.12em; text-align: center; }
    .poem-line { margin-bottom: 0.4rem; }
    .char-box {
      display: inline-block; position: relative; cursor: pointer;
      transition: transform 0.15s; border-radius: 4px; padding: 0 2px;
    }
    .char-box:hover { transform: scale(1.25); z-index: 10; }
    .tooltip {
      display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: rgba(28,25,23,0.92); color: #fff; padding: 0.5rem 0.75rem; border-radius: 8px;

    }
    .char-box:hover .tooltip { display: block; }
    .legend-section {

    .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text-secondary); padding: 3px 6px; border-radius: 6px; transition: background 0.15s; }

    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent-dark); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 0.5rem; vertical-align: middle; }

    .stats-bar { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--text-secondary); }

</head>

<div class="container">
  <header>
    <h1><span>平水韵</span>诗词上色器</h1>

    </div>

const rhymeColorMap = {};
for (const r of RHYME_COLORS) rhymeColorMap[r.name] = { h: r.h, s: r.s, l: r.l };

const API_BASE = 'https://checker.sjtuguoxue.space';
const charCache = {};

async function lookupChars(chars) {
  const unique = [...new Set(chars)].filter(ch => !(ch in charCache));
  if (unique.length === 0) return;
  for (let i = 0; i < unique.length; i += 200) {
    const batch = unique.slice(i, i + 200);
    try {
      const resp = await fetch(`${API_BASE}/api/char/batch`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chars: batch, book: 'Pingshuiyun' })
      });
      if (!resp.ok) { batch.forEach(ch => charCache[ch] = null); continue; }
      const results = await resp.json();
      for (const item of results) {
        charCache[item.char] = {
          rhymes: item.rhyme_categories ? item.rhyme_categories.map(r => r.name) : [],
          tones: item.tones || []
        };
      }
    } catch (e) {
      batch.forEach(ch => charCache[ch] = null);
    }
  }
}

function circularMeanDeg(angles) {
  if (angles.length <= 1) return angles[0] || 0;
  let sinSum = 0, cosSum = 0;
  for (const a of angles) { const r = a * Math.PI / 180; sinSum += Math.sin(r); cosSum += Math.cos(r); }
  let mean = Math.atan2(sinSum / angles.length, cosSum / angles.length) * 180 / Math.PI;
  return Math.round(mean < 0 ? mean + 360 : mean);
}

function arithmeticMean(arr) {
  return arr.length === 0 ? 0 : Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
}

function getCharColor(ch) {
  const info = charCache[ch];
  if (!info || !info.rhymes || info.rhymes.length === 0) return null;
  const colors = [];
  for (const name of info.rhymes) {
    if (rhymeColorMap[name]) colors.push(rhymeColorMap[name]);
  }
  if (colors.length === 0) return null;
  if (colors.length === 1) return { h: colors[0].h, s: colors[0].s, l: colors[0].l, rhymes: info.rhymes, tones: info.tones };
  return {
    h: circularMeanDeg(colors.map(c => c.h)),
    s: arithmeticMean(colors.map(c => c.s)),
    l: arithmeticMean(colors.map(c => c.l)),
    rhymes: info.rhymes, tones: info.tones
  };
}

const EXAMPLES = [
  "春眠不觉晓，\n处处闻啼鸟。\n夜来风雨声，\n花落知多少。",
  "床前明月光，\n疑是地上霜。\n举头望明月，\n低头思故乡。",
  "白日依山尽，\n黄河入海流。\n欲穷千里目，\n更上一层楼。",
  "月落乌啼霜满天，\n江枫渔火对愁眠。\n姑苏城外寒山寺，\n夜半钟声到客船。"
];

function loadExample(idx) { document.getElementById('poemInput').value = EXAMPLES[idx]; }

const PUNCT_RE = /[\s，。！？、；：""''（）《》【】·—…\.,!?\-;:'"()\[\]{}<>\/\\@#$%^&*_+=~`|]/;

async function renderPoem() {
  const text = document.getElementById('poemInput').value.trim();
  if (!text) return;

  const btn = document.getElementById('renderBtn');
  const resultArea = document.getElementById('resultArea');
  btn.disabled = true;
  resultArea.innerHTML = '<div class="loading"><span class="spinner"></span>正在查询韵部数据…</div>';

  const hanzi = [...text].filter(ch => !PUNCT_RE.test(ch));
  await lookupChars(hanzi);

  let totalChars = 0, matchedChars = 0, unmatchedChars = 0;
  const rhymeUsed = new Set();
  const lines = text.split(/\n/);
  let html = '<div class="stats-bar" id="statsBar"></div><div class="poem-display">';

  for (const line of lines) {
    if (line.trim() === '') { html += '<div class="poem-line" style="height:1.2em;"></div>'; continue; }
    html += '<div class="poem-line">';
    for (const ch of line) {
      if (PUNCT_RE.test(ch)) { html += `<span style="color:#999;letter-spacing:0.15em;">${ch}</span>`; continue; }
      totalChars++;
      const color = getCharColor(ch);
      if (color) {
        matchedChars++;
        color.rhymes.forEach(r => rhymeUsed.add(r));
        const hsl = `hsl(${color.h}, ${color.s}%, ${color.l}%)`;
        const ts = color.l > 50
          ? `0 0 8px hsla(${color.h}, ${color.s}%, ${color.l}%, 0.4)`
          : `0 0 6px hsla(${color.h}, ${color.s}%, ${Math.min(color.l + 30, 90)}%, 0.5)`;
        const tip = `<b style="font-size:1.1em">${ch}</b><br>韵部：${color.rhymes.join('、')}<br>声调：${color.tones.join('、')}<br>HSL(${color.h}, ${color.s}%, ${color.l}%)`;
        html += `<span class="char-box" style="color:${hsl};text-shadow:${ts};font-weight:700;">${ch}<span class="tooltip">${tip}</span></span>`;
      } else {
        unmatchedChars++;
        html += `<span class="char-box" style="color:#b8b5b0;">${ch}<span class="tooltip"><b>${ch}</b><br>未收录于字典</span></span>`;
      }
    }
    html += '</div>';
  }
  html += '</div>';
  resultArea.innerHTML = html;
  document.getElementById('statsBar').innerHTML = `
    <span class="stat">汉字总数 <b>${totalChars}</b></span>
    <span class="stat">已匹配 <b>${matchedChars}</b></span>
    <span class="stat">未收录 <b>${unmatchedChars}</b></span>
    <span class="stat">涉及韵部 <b>${rhymeUsed.size}</b> 个</span>`;
  btn.disabled = false;
}

function clearAll() {
  document.getElementById('poemInput').value = '';
  document.getElementById('resultArea').innerHTML = '<div class="result-placeholder">在上方输入文本，点击「渲染上色」查看效果</div>';
}

function buildLegend() {
  const grid = document.getElementById('legendGrid');
  const groups = []; const gm = new Map();
  for (const r of RHYME_COLORS) {
    const k = `${r.s}_${r.l}`;
    if (!gm.has(k)) { const g = { items: [] }; gm.set(k, g); groups.push(g); }
    gm.get(k).items.push(r);
  }
  const labels = ['平声', '上声', '去声', '入声'];
  let html = '';
  groups.forEach((g, i) => {
    html += `<div class="tone-label">${labels[i] || ''}（${g.items.length} 韵）</div>`;
    for (const r of g.items) html += `<div class="legend-item"><span class="legend-dot" style="background:hsl(${r.h},${r.s}%,${r.l}%)"></span><span>${r.name}</span></div>`;
  });
  grid.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  buildLegend();
  document.getElementById('poemInput').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); renderPoem(); }
  });
});
</script>
