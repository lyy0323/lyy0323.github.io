      { text: '分手之后，你通常会？', options: [{ text: 'A. 很快投入新生活，天涯何处无芳草', scores: { L: 2 } }, { text: 'B. 反复回忆过去，写日记或发朋友圈', scores: { D: 2 } }, { text: 'C. 删掉所有照片联系方式，断个干净', scores: { L: 2 } }, { text: 'D. 表面若无其事，偶尔还是梦见', scores: { D: 2 } }] },
      { text: '以下哪种状态更像你？', options: [{ text: 'A. 很少后悔，发生的都是最好的安排', scores: { L: 2 } }, { text: 'B. 经常想“如果当初……就好了”', scores: { D: 2 } }, { text: 'C. 看开了大部分事，但有几件始终放不下', scores: { L: 1, D: 1 } }, { text: 'D. 别人说我想太多，但我控制不住', scores: { D: 2 } }] },
      { text: '面对无法挽回的遗憾，你会？', options: [{ text: 'A. 接受现实，专注能改变的事', scores: { L: 2 } }, { text: 'B. 反复复盘，想弄清哪里出了问题', scores: { D: 2 } }, { text: 'C. 写下来或创作成作品，算个交代', scores: { D: 1, L: 1 } }, { text: 'D. 虽然放下，但心里有个地方永远是空的', scores: { D: 2 } }] },
      { text: '深夜emo时，你更可能？', options: [{ text: 'A. 倒杯酒听歌，明天又是新一天', scores: { L: 2 } }, { text: 'B. 翻看旧照片记录，沉浸回忆', scores: { D: 2 } }, { text: 'C. 找朋友吐槽，骂完就好了', scores: { L: 2 } }, { text: 'D. 把情绪记录下来，写点东西', scores: { D: 2 } }] },
      { text: '写诗或处理重要项目时，你的习惯是？', options: [{ text: 'A. 查阅经典，严格按规范修改到完美', scores: { S: 2 } }, { text: 'B. 喝点小酒，状态来了提笔就写', scores: { F: 2 } }, { text: 'C. 先写草稿，再按规范慢慢修改', scores: { F: 1, S: 1 } }, { text: 'D. 取决于心情，有时严谨有时随性', scores: { F: 1, S: 1 } }] },
      { text: '日常生活中，你更像？', options: [{ text: 'A. 房间可以乱，计划赶不上变化，随遇而安', scores: { F: 2 } }, { text: 'B. 东西必须归类，喜欢列To-Do List', scores: { S: 2 } }, { text: 'C. 外出井井有条，回家放飞自我', scores: { F: 1, S: 1 } }, { text: 'D. 工作严谨，生活随意', scores: { F: 1, S: 1 } }] },
      { text: '周末出游，你会？', options: [{ text: 'A. 提前做攻略，定好行程酒店', scores: { S: 2 } }, { text: 'B. 说走就走，到了再说，边走边玩', scores: { F: 2 } }, { text: 'C. 有大致方向，细节到时候再说', scores: { F: 1, S: 1 } }] },
      { text: '面对规矩和权威，你的态度是？', options: [{ text: 'A. 规矩是用来遵守的，否则就乱套了', scores: { S: 2 } }, { text: 'B. 不合理的规矩就是用来打破的', scores: { F: 2 } }, { text: 'C. 大面上遵守，私下偶尔钻空子', scores: { F: 1, S: 1 } }, { text: 'D. 先服从，有问题通过正当渠道反映', scores: { S: 2 } }] },
      { text: '你的朋友圈/社交媒体状态是？', options: [{ text: 'A. 随时想发就发，不在意排版', scores: { F: 2 } }, { text: 'B. 精心编辑，在固定时间发布', scores: { S: 2 } }, { text: 'C. 很少发，发就发让自己满意的', scores: { S: 1, F: 1 } }, { text: 'D. 已经半年没发过了', scores: { F: 2 } }] },
      { text: '以下哪种状态更让你舒适？', options: [{ text: 'A. 日程稳定可预期，不喜欢变化', scores: { S: 2 } }, { text: 'B. 每天都有新鲜事，讨厌一成不变', scores: { F: 2 } }, { text: 'C. 工作需要稳定，生活需要惊喜', scores: { S: 1, F: 1 } }, { text: 'D. 接受变化，但需提前告知', scores: { S: 2 } }] }
    ];

    // ==========================================
    // 2. 核心逻辑与状态管理 (State & Logic)
    // ==========================================
    
    let state = {
      step: 'start', // 'start', 'quiz', 'result'
      currentQuestion: 0,
      answers: Array(QUESTIONS.length).fill(null),
      resultCode: '',
      lastRenderedQuestion: -1
    };

    function setStep(step) {
      state.step = step;
      render();
    }

    // 处理答题点击
    window.handleAnswer = function(optIdx) {
      const q = QUESTIONS[state.currentQuestion];
      const optionScores = q.options[optIdx].scores;
      const isFirstAnswer = state.answers[state.currentQuestion] === null;

      state.answers[state.currentQuestion] = { index: optIdx, scores: optionScores };

      if (isFirstAnswer && state.currentQuestion < QUESTIONS.length - 1) {
        // 首次作答：直接跳下一题（带入场动画）
        state.currentQuestion++;
        render();
      } else {
        // 修改已有答案或最后一题：仅更新选中样式
        render();
      }
    };

    window.handlePrev = function() {
      if (state.currentQuestion > 0) {
        state.currentQuestion--;
        render();
      }
    };

    window.handleNext = function() {
      if (state.currentQuestion < QUESTIONS.length - 1) {
        state.currentQuestion++;
        render();
      } else {
        calculateResult();
      }
    };

    window.calculateResult = function() {
      let finalScores = { I: 0, O: 0, V: 0, R: 0, L: 0, D: 0, F: 0, S: 0 };
      
      state.answers.forEach(ans => {
        if (ans && ans.scores) {
          Object.keys(ans.scores).forEach(key => {
            finalScores[key] += ans.scores[key];
          });
        }
      });

      // 维度判定
      const dim1 = finalScores.I > finalScores.O ? 'I' : 'O';
      const dim2 = finalScores.V > finalScores.R ? 'V' : 'R';
      const dim3 = finalScores.L > finalScores.D ? 'L' : 'D';
      const dim4 = finalScores.F > finalScores.S ? 'F' : 'S';
      
      state.resultCode = `${dim1}${dim2}${dim3}${dim4}`;
      state.step = 'result';
      state.isAnimating = false;
      render();
    };

    window.resetQuiz = function() {
      state.answers = Array(QUESTIONS.length).fill(null);
      state.currentQuestion = 0;
      state.resultCode = '';
      state.lastRenderedQuestion = -1;
      state.step = 'start';
      render();
    };

    window.downloadPoster = function() {
      const posterElement = document.getElementById('poster-card');
      if (!posterElement) return;

      const btn = document.getElementById('save-btn');
      btn.innerText = "正在生成图片...";

      // 使用更现代的 html-to-image 进行截图，完美支持 Flexbox
      htmlToImage.toPng(posterElement, {
        quality: 1,
        pixelRatio: 2,
        backgroundColor: '#ffffff'
      })
      .then(function (dataUrl) {
        // 弹出遮罩层，长按保存（兼容微信）
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease';
        overlay.innerHTML = '<button style="position:absolute;top:16px;right:20px;color:rgba(255,255,255,.6);font-size:28px;cursor:pointer;background:none;border:none;width:40px;height:40px">&times;</button>'
          + '<img src="' + dataUrl + '" style="max-width:375px;width:100%;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,.5)" />'
          + '<div style="color:rgba(255,255,255,.8);font-size:14px;margin-top:16px;text-align:center">长按图片保存到相册</div>';
        document.body.appendChild(overlay);
        var close = function() { overlay.remove(); };
        overlay.querySelector('button').addEventListener('click', close);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
        btn.innerText = "保存结果图片";
      })
      .catch(function (error) {
        console.error('oops, something went wrong!', error);
        alert("保存失败，请截图保存");
        btn.innerText = "保存结果图片";
      });
    };

    // 在结果页渲染后注入二维码
    window.injectQR = function() {
      var el = document.getElementById('poster-qr');
      if (!el || typeof qrcode === 'undefined') return;
      try {
        var qr = qrcode(0, 'M');
        qr.addData(location.href);
        qr.make();
        el.innerHTML = qr.createSvgTag({cellSize:2, margin:1, scalable:true});
      } catch(e) { console.warn('QR failed:', e); }
    };

    // ==========================================
    // 3. 视图渲染 (View/DOM Manipulation)
    // ==========================================

    function renderStart() {
      return `
        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center animate-fade-in relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-stone-200 to-transparent opacity-50 pointer-events-none"></div>
          <div class="w-24 h-24 mb-8 border border-stone-400 rounded-full flex items-center justify-center bg-white shadow-sm">
            <span class="text-4xl font-serif text-stone-700">詩</span>
          </div>
          <h1 class="text-3xl font-serif text-stone-800 mb-4 tracking-widest">你的灵魂住着哪位诗人？</h1>
          <p class="text-stone-500 mb-12 max-w-sm leading-relaxed text-sm">
            如果穿越回大唐或两宋，你会是哪位名场面缔造者？<br/>
            通过24个生活切片，测出你内心深处潜藏的「古典人格」。
          </p>
          <button onclick="setStep('quiz')" class="px-10 py-3 bg-stone-800 text-[#f4f1ec] rounded-full hover:bg-stone-700 transition-colors tracking-widest font-medium shadow-lg">
            开启测算
          </button>
          <p class="mt-6 text-xs text-stone-400 tracking-wider">共 24 题 · 请跟随直觉作答</p>
        </div>
      `;
    }

    function renderQuiz() {
      const q = QUESTIONS[state.currentQuestion];
      const progress = ((state.currentQuestion) / QUESTIONS.length) * 100;
      const isNewQuestion = state.lastRenderedQuestion !== state.currentQuestion;
      state.lastRenderedQuestion = state.currentQuestion;

      let optionsHtml = '';
      q.options.forEach((opt, idx) => {
        const isSelected = state.answers[state.currentQuestion]?.index === idx;
        const selectedClass = isSelected
          ? 'selected border-stone-800 bg-stone-100 ring-1 ring-stone-800 text-stone-900 shadow-md'
          : 'border-stone-300 bg-white/50 text-stone-700 hover:bg-white hover:border-stone-400 hover:shadow-sm';
        const enterClass = isNewQuestion ? 'option-enter' : '';
        const delay = isNewQuestion ? `animation-delay: ${idx * 60}ms` : '';

        optionsHtml += `
          <button onclick="handleAnswer(${idx})" class="option-btn w-full text-left p-4 rounded-xl border text-sm leading-relaxed ${enterClass} ${selectedClass}" style="${delay}">
            ${opt.text}
          </button>
        `;
      });

      const prevDisabled = state.currentQuestion === 0;
      const prevClass = prevDisabled ? 'opacity-0 pointer-events-none' : 'bg-white border border-stone-300 text-stone-600 hover:bg-stone-50 shadow-sm';
      
      const hasAnswer = state.answers[state.currentQuestion] !== null;
      const nextClass = !hasAnswer ? 'bg-stone-200 text-stone-400 cursor-not-allowed' : 'bg-stone-800 text-white hover:bg-stone-700';
      const nextText = state.currentQuestion === QUESTIONS.length - 1 ? '查看结果' : '下一题';

      return `
        <div class="flex flex-col min-h-screen p-6 max-w-md mx-auto">
          <!-- 进度条 -->
          <div class="w-full mt-4 mb-8">
            <div class="flex justify-between text-xs text-stone-400 mb-2 font-serif">
              <span>${state.currentQuestion + 1} / 24</span>
              <span>${Math.round(progress)}% 溯源中...</span>
            </div>
            <div class="h-1 w-full bg-stone-200 rounded-full overflow-hidden">
              <div class="h-full bg-teal-700/70 transition-all duration-500 ease-out" style="width: ${progress}%"></div>
            </div>
          </div>

          <!-- 题目与选项 -->
          <div class="flex-1 flex flex-col ${isNewQuestion ? 'quiz-enter' : ''}">
            <div class="mb-10">
              <h2 class="text-xl text-stone-800 font-serif leading-relaxed">${q.text}</h2>
            </div>
            <div class="space-y-4 mt-auto">
              ${optionsHtml}
            </div>

            <!-- 底部导航 -->
            <div class="flex justify-between mt-10 mb-6">
              <button onclick="handlePrev()" ${prevDisabled ? 'disabled' : ''} class="px-6 py-2.5 rounded-full text-sm tracking-widest font-serif transition-all duration-300 ${prevClass}">
                上一题
              </button>
              <button id="btn-next" onclick="handleNext()" ${!hasAnswer ? 'disabled' : ''} class="px-6 py-2.5 rounded-full text-sm tracking-widest font-serif transition-all duration-300 shadow-sm ${nextClass}">
                ${nextText}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderResult() {
      const profile = PROFILES[state.resultCode];
      if (!profile) return `<div class="p-10 text-center">系统出错啦</div>`;

      let tagsHtml = '';
      profile.tags.forEach(tag => {
        // 还原为干净的 Tailwind Flex 居中写法
        tagsHtml += `<div class="inline-flex items-center justify-center px-3 py-1.5 bg-stone-100 text-stone-500 text-xs rounded-full border border-stone-200">#${tag}</div>`;
      });

      const dim1 = state.resultCode[0] === 'I' ? '庙堂入世' : '江湖出世';
      const dim2 = state.resultCode[1] === 'V' ? '神游造境' : '人间烟火';
      const dim3 = state.resultCode[2] === 'L' ? '释然自愈' : '执念深情';
      const dim4 = state.resultCode[3] === 'F' ? '任性反骨' : '秩序法度';

      const c = profile.colors;

      return `
        <div class="min-h-screen p-6 flex flex-col items-center justify-center font-serif text-stone-800 animate-fade-in pb-12">

          <!-- 海报主体内容 (用于截图) -->
          <div id="poster-card" class="w-full max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden relative border border-stone-200">
            <!-- 海报顶部图案/背景色块 -->
            <div class="h-48 relative flex items-center justify-center overflow-hidden" style="background: linear-gradient(to bottom right, ${c.gradientFrom}, ${c.gradientTo})">
              <div class="absolute w-48 h-48 rounded-full -right-16 -top-16" style="border: 1px solid ${c.circle}"></div>
              <div class="absolute w-64 h-64 rounded-full -left-20 -bottom-20" style="border: 1px solid ${c.circle}"></div>

              <!-- 代表性诗句（竖排） -->
              <div class="vertical-text absolute right-6 top-6 bottom-6 font-serif text-xs tracking-[0.2em] z-0 leading-relaxed" style="color: ${c.quote}">
                ${profile.quote.replace(/([，。！？；、]+)/g, '$1<br>')}
              </div>

              <!-- 诗人首字大Logo -->
              <div class="w-24 h-24 backdrop-blur-sm rounded-full flex items-center justify-center text-4xl shadow-sm z-10" style="background: ${c.logoBg}; color: ${c.logoText}">
                 ${profile.name.charAt(0)}
              </div>
            </div>

            <!-- 稀有度标签挪到左上角，还原为 Flex 居中 -->
            <div class="absolute top-4 left-4 z-20 bg-red-800/80 text-white text-[10px] px-2 py-1 rounded tracking-wider backdrop-blur-sm shadow-sm flex items-center justify-center">
              全网稀有度 ${profile.rarity}
            </div>

            <div class="p-6 bg-white">
              <h2 class="text-center text-xs text-stone-400 tracking-widest mb-1 font-sans">YOUR POETRY PERSONA</h2>
              <h1 class="text-2xl text-center font-bold text-stone-800 mb-2">
                【${profile.name}】型人格
              </h1>
              <p class="text-center text-sm text-teal-800/80 font-medium mb-6">
                "${profile.label}"
              </p>

              <div class="bg-stone-50 rounded-lg p-4 mb-6 border border-stone-100 font-sans">
                <p class="text-sm leading-loose text-stone-600 text-justify">
                  ${profile.desc}
                </p>
              </div>

              <div class="flex flex-wrap justify-center gap-2 mb-4 font-sans">
                ${tagsHtml}
              </div>
              
              <!-- 维度小贴士 -->
              <div class="mt-6 pt-4 border-t border-stone-100 flex justify-between text-[10px] text-stone-400 font-sans">
                <span>${dim1}</span>
                <span>${dim2}</span>
                <span>${dim3}</span>
                <span>${dim4}</span>
              </div>

              <!-- 底部二维码 + 文案 -->
              <div class="mt-4 pt-4 border-t border-stone-100 flex items-center justify-between gap-3">
                <div class="text-[10px] text-stone-400 font-sans leading-relaxed">
                  <div class="text-stone-500 font-medium text-[11px]">你的灵魂住着哪位诗人？</div>
                  <div>扫码测测你的古典人格</div>
                </div>
                <div id="poster-qr" class="w-14 h-14 flex-shrink-0"></div>
              </div>
            </div>
          </div>

          <!-- 底部操作区 (不会被截图的部分) -->
          <div class="w-full max-w-sm mt-8 space-y-3 font-sans">
            <button id="save-btn" onclick="downloadPoster()" class="w-full py-3 bg-stone-800 text-white rounded-xl shadow-md tracking-widest text-sm hover:bg-stone-700 transition-colors flex justify-center items-center gap-2">
               <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
               </svg>
               保存结果图片
            </button>
            <button onclick="resetQuiz()" class="w-full py-3 bg-transparent text-stone-500 border border-stone-300 rounded-xl tracking-widest text-sm hover:bg-stone-200 transition-colors">
              重新测算
            </button>
          </div>
          <p class="mt-6 text-[10px] text-stone-300 text-center tracking-wide">© <a href="https://sjtuguoxue.space/" target="_blank" class="underline underline-offset-2 hover:text-stone-400">南洋吟游 · 上海交大国学社</a></p>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      if (state.step === 'start') {
        app.innerHTML = renderStart();
      } else if (state.step === 'quiz') {
        app.innerHTML = renderQuiz();
      } else if (state.step === 'result') {
        app.innerHTML = renderResult();
        injectQR();
      }
    }

    // ==========================================
    // 4. 初始化应用
    // ==========================================
    
    // 初始渲染
    render();

  </script>
</body>
</html>
